<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="root@coax - 一套实用的前端工具集合，包括文本转换、图片压缩、密码生成等工具，所有工具均可免费使用。">
    <meta name="keywords" content="在线工具, 文本转换, 图片压缩, 密码生成, 时间戳转换, JSON格式化, 身份证生成">
    <meta name="author" content="coax">
    <title>root@coax</title>
    <!-- 主题初始化：防止 FOUC（Flash of Unstyled Content）闪烁 -->
    <script>
    (function() {
        var saved = localStorage.getItem('coax-tools-mode');
        var theme = saved === 'light' ? 'light' : 'sci-fi';
        document.documentElement.setAttribute('data-theme', theme);
    })();
    </script>
    <link rel="stylesheet" href="styles/theme-base.css?v=20250411">
    <link rel="stylesheet" href="styles/theme-sci-fi.css?v=20250411">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23a78bfa'/%3E%3Cstop offset='100%25' stop-color='%2322d3ee'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='45' fill='none' stroke='url(%23g)' stroke-width='6'/%3E%3Cpath d='M50 20v25l20 15' stroke='url(%23g)' stroke-width='6' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
    <!-- Google Fonts: Inter for premium UI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap?v=20250411" rel="stylesheet">
</head>
<body data-theme="sci-fi">
    <!-- 全局动态背景 -->
    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grid-pattern" aria-hidden="true"></div>

    <div class="container">
        <header>
            <div class="header-search">
                <div class="search-box">
                    <input type="text" id="toolSearch" placeholder="搜索工具..." autocomplete="off">
                    <span class="search-hint">/</span>
                </div>
            </div>
        </header>
        
        <main>
            <section class="tools-grid" id="toolsGrid">
            </section>
            <div class="no-results hidden" id="noResults">
                <p>没有找到匹配的工具</p>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; <span id="currentYear"></span> root@coax. 保留所有权利。</p>
                <p>渝ICP备2025071398号</p>
            </div>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script src="js/theme-switcher.js"></script>
</body>
</html>
