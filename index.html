<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="root@coax - 一套实用的前端工具集合，包括文本转换、图片压缩、密码生成等工具，所有工具均可免费使用。">
    <meta name="keywords" content="在线工具, 文本转换, 图片压缩, 密码生成, 时间戳转换, JSON格式化, 身份证生成">
    <meta name="author" content="coax">
    <title>root@coax</title>
    <!-- 主题初始化：防止 FOUC（Flash of Unstyled Content）闪烁 -->
    <script>
    (function() {
        var saved = localStorage.getItem('coax-tools-mode');
        if (saved === 'light') {
            // 优先设置在 html 元素上（head 中 body 尚不存在）
            document.documentElement.setAttribute('data-mode', 'light');
        }
    })();
    </script>
    <link rel="stylesheet" href="styles/theme-base.css">
    <link rel="stylesheet" href="styles/theme-cli.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
</head>
<body data-theme="cli">
    <div class="container">
        <header>
            <div class="header-search">
                <div class="search-box">
                    <input type="text" id="toolSearch" placeholder="搜索工具..." autocomplete="off">
                    <span class="search-hint">/</span>
                </div>
            </div>
        </header>
        
        <main>
            <section class="tools-grid" id="toolsGrid">
            </section>
            <div class="no-results hidden" id="noResults">
                <p>没有找到匹配的工具</p>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; <span id="currentYear"></span> root@coax. 保留所有权利。</p>
                <p>渝ICP备2025071398号</p>
            </div>
        </footer>
    </div>

    <script src="js/main.js"></script>
    <script src="js/theme-switcher.js"></script>
</body>
</html>
