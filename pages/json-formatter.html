<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JSON格式化工具可验证并格式化JSON数据，使其更易读和调试，支持自定义缩进空格数，适用于Web开发和API测试场景。">
    <meta name="keywords" content="JSON格式化, JSON验证, JSON工具, JSON美化, Web开发">
    <meta name="author" content="coax">
    <title>JSON格式化工具 - coax的小工具</title>
    <!-- 主题初始化：防止 FOUC（Flash of Unstyled Content）闪烁 -->
    <script>
    (function() {
        var saved = localStorage.getItem('coax-tools-mode');
        if (saved === 'light') {
            document.body.setAttribute('data-mode', 'light');
        }
    })();
    </script>
    <link rel="stylesheet" href="../styles/theme-base.css">
    <link rel="stylesheet" href="../styles/theme-cli.css">
    <link rel="stylesheet" href="../css/json-formatter.css">
    <link rel="stylesheet" href="../css/json-graph.css">
</head>
<body data-theme="cli">
    <div class="container">
        <main>
            <div class="formatter-container">
                <div class="panels-container">
                    <div class="panel" id="inputPanel">
                        <textarea id="inputJson" placeholder="粘贴或输入 JSON..."></textarea>
                    </div>

                    <div class="panel" id="outputPanel">
                        <div class="output-actions">
                            <button class="action-btn" id="actionToggle" title="操作">☰</button>
                            <button class="action-btn" id="graphToggle" title="图谱视图">🔗</button>
                            <div class="action-menu" id="actionMenu">
                                <button class="action-item" id="yamlConvert">转YAML</button>
                                <button class="action-item" id="toonConvert">转TOON</button>
                                <button class="action-item" id="extractStructure">提取结构</button>
                                <button class="action-item" id="compressJson">压缩JSON</button>
                            </div>
                        </div>
                        <div id="outputJson" contenteditable="true" spellcheck="false"></div>
                        <textarea id="outputJsonData" style="display:none;"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../js/theme-switcher.js"></script>
    <script src="../js/json-formatter.js"></script>
    <script src="../js/json-graph.js"></script>
</body>
</html>
