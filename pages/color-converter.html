<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="颜色格式转换工具支持HEX、RGB、RGBA、HSL、HSB等多种颜色格式互转，实时预览颜色效果。">
    <meta name="keywords" content="颜色转换, HEX, RGB, HSL, HSB, 颜色格式, 前端开发">
    <meta name="author" content="coax">
    <title>颜色格式转换 - coax的小工具</title>
    <link rel="stylesheet" href="../styles/theme-base.css">
    <link rel="stylesheet" href="../styles/theme-cli.css">
    <link rel="stylesheet" href="../css/color-converter.css">
</head>
<body data-theme="cli">
    <div class="container">
        <main>
            <div class="converter-container">
                <div class="converter-header">
                    <h1>颜色格式转换</h1>
                    <p>支持HEX、RGB、RGBA、HSL、HSB格式互转</p>
                </div>
                
                <div class="message" id="message"></div>
                
                <div class="color-preview-section">
                    <div class="color-preview" id="colorPreview"></div>
                    <div class="color-picker-row">
                        <label for="colorPicker">取色器:</label>
                        <input type="color" id="colorPicker" value="#00ff00">
                    </div>
                </div>
                
                <div class="input-section">
                    <div class="input-group">
                        <label for="hexInput">HEX</label>
                        <input type="text" id="hexInput" placeholder="#RRGGBB 或 #RGB">
                        <button class="btn-small copy-btn" data-target="hexInput">复制</button>
                    </div>
                    <div class="input-group">
                        <label for="rgbInput">RGB</label>
                        <input type="text" id="rgbInput" placeholder="rgb(r, g, b)">
                        <button class="btn-small copy-btn" data-target="rgbInput">复制</button>
                    </div>
                    <div class="input-group">
                        <label for="rgbaInput">RGBA</label>
                        <input type="text" id="rgbaInput" placeholder="rgba(r, g, b, a)">
                        <button class="btn-small copy-btn" data-target="rgbaInput">复制</button>
                    </div>
                    <div class="input-group">
                        <label for="hslInput">HSL</label>
                        <input type="text" id="hslInput" placeholder="hsl(h, s%, l%)">
                        <button class="btn-small copy-btn" data-target="hslInput">复制</button>
                    </div>
                    <div class="input-group">
                        <label for="hsbInput">HSB</label>
                        <input type="text" id="hsbInput" placeholder="hsb(h, s%, b%)">
                        <button class="btn-small copy-btn" data-target="hsbInput">复制</button>
                    </div>
                </div>
                
                <div class="controls">
                    <button id="convertBtn" class="btn-large convert-btn">转换</button>
                    <button id="clearBtn" class="btn-large clear-btn">清空</button>
                    <button id="randomBtn" class="btn-large random-btn">随机颜色</button>
                </div>
                
                <div class="palette-section">
                    <h3>预设调色板</h3>
                    <div class="palette-grid" id="paletteGrid"></div>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; <span id="currentYear"></span> coax的小工具.</p>
            </div>
        </footer>
    </div>

    <script src="../js/color-converter.js"></script>
    <script src="../js/theme-switcher.js"></script>
</body>
</html>
