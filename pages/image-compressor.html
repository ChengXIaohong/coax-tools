<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="在线图片压缩工具支持JPG、PNG、WEBP等格式图片压缩，可自定义压缩质量和最大宽度，帮助减小图片文件大小。">
    <meta name="keywords" content="图片压缩, 图片优化, JPG压缩, PNG压缩, WEBP压缩, 在线压缩">
    <meta name="author" content="coax">
    <title>图片压缩工具 - coax的小工具</title>
    <!-- 主题初始化：防止 FOUC（Flash of Unstyled Content）闪烁 -->
    <script>
    (function() {
        var saved = localStorage.getItem('coax-tools-mode');
        var theme = saved === 'light' ? 'light' : 'sci-fi';
        document.documentElement.setAttribute('data-theme', theme);
    })();
    </script>
    <link rel="stylesheet" href="../styles/theme-base.css">
    <link rel="stylesheet" href="../styles/theme-tool.css">
    <link rel="stylesheet" href="../css/image-compressor.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body data-theme="sci-fi">
    <div class="bg-orbs"></div>
    <div class="grid-pattern"></div>
    <div class="container">
        <main class="docx-main">
            <!-- 统一顶栏 -->
            <header class="tool-header-bar">
                <a href="../index.html" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    返回首页
                </a>
                <div class="tool-title">
                    <div class="tool-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <polyline points="21 15 16 10 5 21"/>
                        </svg>
                    </div>
                    <span class="tool-name">图片压缩工具</span>
                </div>
                <span class="tool-desc">压缩图片文件大小</span>
            </header>

            <!-- 内容区 -->
            <div class="content-zone">
                <!-- 操作区 -->
                <div class="compressor-container">
                    <div class="message" id="message"></div>

                    <div class="upload-section" id="uploadSection">
                        <div class="upload-area" id="uploadArea">
                            <i class="cloud-icon">☁️</i>
                            <h3>拖拽图片到此处或点击上传</h3>
                            <p>将您的图片文件拖放到此处，或点击下方按钮选择文件</p>
                            <div class="format-hint">
                                <span class="format-tag">JPG</span>
                                <span class="format-tag">PNG</span>
                                <span class="format-tag">WEBP</span>
                                <span class="format-tag">建议小于 10MB（更大文件也能处理）</span>
                            </div>
                            <div class="file-input-wrapper">
                                <button class="file-input-button">选择图片</button>
                                <input type="file" id="imageInput" accept=".jpg,.jpeg,.png,.webp">
                            </div>
                            <p id="fileInfo"></p>
                        </div>
                    </div>

                    <div class="editor-section" id="editorSection">
                        <div class="preview-container">
                            <div class="preview-panel original">
                                <h3>原始图片</h3>
                                <div class="preview-wrapper">
                                    <img id="originalPreview" class="image-preview" alt="原始图片预览">
                                    <div class="preview-placeholder" id="originalPlaceholder">
                                        <span class="icon">🖼️</span>
                                        <span>原始图片预览</span>
                                    </div>
                                    <div class="preview-tooltip" id="originalTooltip"></div>
                                </div>
                            </div>

                            <div class="preview-panel compressed">
                                <h3>压缩结果</h3>
                                <div class="preview-wrapper">
                                    <img id="compressedPreview" class="image-preview" alt="压缩后图片预览">
                                    <div class="preview-placeholder" id="compressedPlaceholder">
                                        <span class="icon">📦</span>
                                        <span>压缩后预览</span>
                                    </div>
                                    <div class="preview-tooltip" id="compressedTooltip"></div>
                                </div>
                            </div>
                        </div>

                        <div class="controls-panel collapsed" id="controlsPanel">
                            <button class="controls-toggle" id="controlsToggle">
                                <span>高级设置</span>
                                <span class="toggle-icon">▸</span>
                            </button>
                            <div class="controls-body">
                                <div class="control-group">
                                    <label for="quality">
                                        <span>压缩质量 <span class="hint">(值越高文件越大)</span></span>
                                        <span id="qualityValue" class="slider-value">80%</span>
                                    </label>
                                    <input type="range" id="quality" min="10" max="100" value="80">
                                </div>

                                <div class="control-group">
                                    <label for="maxWidth">
                                        <span>最大宽度 <span class="hint">(超过此宽度将缩放)</span></span>
                                        <output id="widthValue" class="slider-value" for="maxWidth">1920px</output>
                                    </label>
                                    <input type="range" id="maxWidth" min="100" max="4000" step="100" value="1920">
                                </div>
                            </div>
                        </div>

                        <div class="progress-container" id="progressContainer">
                            <div class="progress-header">
                                <span class="progress-status">
                                    <span class="progress-spinner"></span>
                                    <span id="progressText">压缩中...</span>
                                </span>
                                <span id="progressPercent">0%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button id="compressBtn" class="btn btn-primary">🗜️ 压缩图片</button>
                            <a id="downloadBtn" class="btn btn-download" download="compressed-image.jpg">⬇️ 下载图片</a>
                            <button id="resetBtn" class="btn btn-ghost">🔄 重新选择</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-content">
                <p>&copy; <span id="currentYear"></span> root@coax. 保留所有权利。</p>
                <p>渝ICP备2025071398号</p>
            </div>
        </footer>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content">
            <div class="loading-spinner-large"></div>
            <p class="loading-text">图片压缩中...</p>
            <p class="loading-detail">正在优化您的图片，请稍候</p>
        </div>
    </div>

    <script src="../js/theme-switcher.js"></script>
    <script src="../js/image-compressor.js"></script>
</body>
</html>
