<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Markdown 编辑器，支持实时预览和语法高亮，轻松编写 Markdown 文档。">
    <meta name="keywords" content="Markdown, 编辑器, MD, 实时预览, 写作工具">
    <meta name="author" content="coax">
    <title>Markdown 编辑器 - coax的小工具</title>
    <!-- 主题初始化：防止 FOUC（Flash of Unstyled Content）闪烁 -->
    <script>
    (function() {
        var saved = localStorage.getItem('coax-tools-mode');
        var theme = saved === 'light' ? 'light' : 'sci-fi';
        document.documentElement.setAttribute('data-theme', theme);
    })();
    </script>
    <link rel="stylesheet" href="../styles/theme-base.css">
    <link rel="stylesheet" href="../styles/theme-tool.css">
    <link rel="stylesheet" href="../css/markdown-editor.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body data-theme="sci-fi">
    <div class="bg-orbs"></div>
    <div class="grid-pattern"></div>
    <div class="container">
        <main class="formatter-container">
            <!-- 统一顶栏 -->
            <header class="tool-header-bar">
                <a href="../index.html" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    返回首页
                </a>
                <div class="tool-title">
                    <div class="tool-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                        </svg>
                    </div>
                    <span class="tool-name">Markdown编辑器</span>
                </div>
                <span class="tool-desc">实时预览Markdown内容</span>
            </header>
            <div class="editor-panels">
                <!-- 编辑面板 -->
                <div class="panel input-panel">
                    <div class="panel-header">
                        <div class="panel-header-left">
                            <span class="word-count" id="editCount">0 字</span>
                        </div>
                        <div class="panel-header-right">
                            <div class="format-wrapper">
                                <button class="action-btn" id="formatBtn" title="格式化">
                                    <span class="material-icons">format_size</span>
                                </button>
                                <div class="format-dropdown" id="formatDropdown">
                                    <button class="action-item" data-action="bold"><strong>B</strong> 粗体</button>
                                    <button class="action-item" data-action="italic"><em>I</em> 斜体</button>
                                    <button class="action-item" data-action="strikethrough"><s>S</s> 删除线</button>
                                    <div class="action-separator"></div>
                                    <button class="action-item" data-action="heading">H 标题</button>
                                    <button class="action-item" data-action="quote">" 引用</button>
                                    <button class="action-item" data-action="code">&lt;/&gt; 代码</button>
                                    <div class="action-separator"></div>
                                    <button class="action-item" data-action="link">🔗 链接</button>
                                    <button class="action-item" data-action="image">🖼️ 图片</button>
                                    <button class="action-item" data-action="list-ul">• 无序列表</button>
                                    <button class="action-item" data-action="list-ol">1. 有序列表</button>
                                    <div class="action-separator"></div>
                                    <button class="action-item" data-action="hr">— 水平线</button>
                                    <button class="action-item" data-action="table">⊞ 表格</button>
                                </div>
                            </div>
                            <button class="action-btn" id="clearBtn" title="清空">
                                <span class="material-icons">delete_outline</span>
                            </button>
                        </div>
                    </div>
                    <textarea id="mdInput" placeholder="在此输入 Markdown 内容..."

常用快捷键：
• Ctrl+B  粗体
• Ctrl+I  斜体
• Ctrl+K  插入链接"></textarea>
                </div>

                <!-- 预览面板 -->
                <div class="panel output-panel">
                    <div class="panel-header">
                        <div class="panel-header-left">
                            <span class="word-count" id="previewCount">0 字</span>
                        </div>
                        <div class="panel-header-right">
                            <button class="action-btn" id="copyHtmlBtn" title="复制HTML">
                                <span class="material-icons">content_copy</span>
                            </button>
                            <button class="action-btn" id="fullscreenBtn" title="全屏">
                                <span class="material-icons">fullscreen</span>
                            </button>
                        </div>
                    </div>
                    <div id="mdPreview" class="markdown-body"></div>
                    
                    <!-- 快捷键提示 -->
                    <div class="shortcuts-hint">
                        <span class="shortcut-item"><span class="shortcut-key">Ctrl+B</span> 粗体</span>
                        <span class="shortcut-item"><span class="shortcut-key">Ctrl+I</span> 斜体</span>
                        <span class="shortcut-item"><span class="shortcut-key">Ctrl+K</span> 链接</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 消息提示 -->
    <div class="message" id="message"></div>

    <script src="../js/theme-switcher.js"></script>
    <script src="../js/markdown-editor.js"></script>
</body>
</html>
